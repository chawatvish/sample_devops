services:
  go-api-1:
    image: ${GO_API_IMAGE:-ghcr.io/chawatvish/sample_devops:latest}
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      - PORT=8080
    restart: unless-stopped

  go-api-2:
    image: ${GO_API_IMAGE:-ghcr.io/chawatvish/sample_devops:latest}
    ports:
      - "127.0.0.1:8082:8080"
    environment:
      - PORT=8080
    restart: unless-stopped
