services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - go-api
    restart: unless-stopped

  go-api:
    image: ${GO_API_IMAGE:-ghcr.io/chawatvish/sample_devops:latest}
    expose:
      - "8080"
    environment:
      - PORT=8080
    restart: unless-stopped
