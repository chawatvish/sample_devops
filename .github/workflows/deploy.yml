name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CONTAINER_NAME: go-api

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run tests
        run: go test -v -race -count=1 ./...

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    name: Deploy to DigitalOcean Droplet
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy compose and nginx config to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "docker-compose.yml,nginx/"
          target: "/opt/go-api"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e

            IMAGE="ghcr.io/${{ github.repository }}:sha-${{ github.sha }}"

            echo "==> Logging in to GHCR"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin

            echo "==> Pulling new image: ${IMAGE}"
            docker pull "${IMAGE}"

            echo "==> Writing .env with current image tag"
            echo "GO_API_IMAGE=${IMAGE}" > /opt/go-api/.env

            echo "==> Installing nginx site config"
            cp /opt/go-api/nginx/go-api.conf /etc/nginx/sites-available/go-api
            ln -sf /etc/nginx/sites-available/go-api /etc/nginx/sites-enabled/go-api
            rm -f /etc/nginx/sites-enabled/default
            nginx -t

            echo "==> Rolling update: go-api-1"
            cd /opt/go-api
            docker compose up -d --no-deps --force-recreate go-api-1
            sleep 3

            echo "==> Rolling update: go-api-2"
            docker compose up -d --no-deps --force-recreate go-api-2
            sleep 3

            echo "==> Reloading nginx config (graceful, no downtime)"
            systemctl reload nginx

            echo "==> Stack status"
            docker compose ps

            echo "==> Pruning old images"
            docker image prune -f

            echo "==> Deploy complete"
